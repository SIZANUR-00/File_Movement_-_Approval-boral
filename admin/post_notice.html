<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>post_notice</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
         /* ---------- HEADER ---------- */
    header.topbar{
      position:fixed;top:0;left:0;right:0;z-index:60;
      display:flex;
      justify-content:center;
      pointer-events:none;
    }
    header .bar{
      pointer-events:auto;
      width:100%;max-width:var(--container-width);
      display:flex;align-items:center;justify-content:space-between;
      gap:16px;padding:18px 24px;margin:16px;
      background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));
      border-radius:12px;
      backdrop-filter:blur(10px) saturate(120%);
      box-shadow:0 6px 24px rgba(6,12,34,0.12);
    }

    .brand{display:flex;align-items:center;gap:12px}
    .brand .logo{
      width:44px;height:44px;border-radius:8px;
      overflow:hidden;background:linear-gradient(135deg,var(--accent),var(--accent-2));
      display:flex;align-items:center;justify-content:center;
    }
    .brand .logo img{width:100%;height:100%;object-fit:contain}
    .brand h1{color:#b29315;font-size:1.1rem;font-weight:600;text-shadow:0 2px 8px rgba(62, 8, 8, 0.35)}

    nav.topnav{display:flex;align-items:center;gap:14px}
    nav.topnav a{
      color:#bf3737;text-decoration:none;font-weight:600;
      padding:8px 14px;border-radius:8px;transition:0.25s;
    }
    nav.topnav a:hover{background:rgba(255,255,255,0.15);transform:translateY(-2px)}

    .user-info{
      display:flex;align-items:center;gap:20px;color:#129922;font-weight:900;
    }
    .user-info i{font-size:20px}
    .logout-btn{
      background:var(--gold);color:#000;border:none;
      padding:8px 14px;border-radius:8px;cursor:pointer;
      font-weight:600;display:flex;align-items:center;gap:6px;
      box-shadow:0 6px 18px rgba(255,206,0,0.25);
      transition:0.2s;
    }
    .logout-btn:hover{background:#ffd633;transform:translateY(-2px)}

    section {
        padding: 150px 20px;
    }

    h1 {
        text-align: center;
        margin-top: 20px;
    }

    form {
        max-width: 600px;
        margin: 20px auto;
        padding: 20px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background: #5cb85c;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #4cae4c;
        }
    </style>
</head>
<body>
    <header class="topbar">
    <div class="bar">
      <div class="brand">
        <div class="logo" title="BAUET">
          <img src="/image/bauet-logo2.png" alt="BAUET Logo" style="width:100%; height:100%; object-fit:contain;">
        </div>
        <div>
          <a href="a_dashboard.html" style="text-decoration: none;"><h1>File Movement & Approval</h1></a>
          
        </div>
      </div>

      <nav class="topnav">
        <a href="manage_users.html"><i class="fas fa-users"></i> Users</a>
        <a href="manage_departments.html"><i class="fas fa-building"></i> Departments</a>
        <a href="post_notice.html"><i class="fas fa-bullhorn"></i> Notices</a>
        <a href="pending_files.html"><i class="fas fa-clock"></i> Pending Files</a>
      </nav>

      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span>Admin</span>
        <button class="logout-btn" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </div>
  </header>
  <section>
    <h1>Post Notice</h1>
    
        <label for="title">Title:</label>
        <input type="text" id="title" placeholder="Notice Title" required>

        <label for="description">Description:</label>
        <textarea id="message"  placeholder="Write notice" rows="4" required></textarea>
        <button onclick="postNotice()">Publish Notice</button>
  </section>

<script type="module" src="../js/post_notice.js"></script>
<script type="module" src="../js/auth.js"></script>
</body>
</html>
