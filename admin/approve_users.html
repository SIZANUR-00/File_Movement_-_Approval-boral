<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Approve Users - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/responsive-global.css">
  <style>
    :root {
      --accent:#282424;
      --accent-2:#3f8fd5;
      --muted:#243557;
      --gold:#ffce00;
      --green:#3cdd77bd;
      --red:#e74c3c;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    
    body {
      background: #f6f7fb;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 {
      color: var(--accent-2);
      margin: 30px 0;
    }
    
    table {
      width: 100%;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }
    
    th {
      background: var(--accent-2);
      color: white;
      padding: 15px;
      text-align: left;
    }
    
    td {
      padding: 15px;
      border-bottom: 1px solid #e2e8f0;
    }
    
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    
    .status-pending {
      background: #fff3cd;
      color: #856404;
    }
    
    .status-approved {
      background: #d4edda;
      color: #155724;
    }
    
    .status-rejected {
      background: #f8d7da;
      color: #721c24;
    }
    
    .btn-approve {
      background: var(--green);
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 5px;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }
    
    .btn-approve:hover {
      background: #2ecc71;
      transform: translateY(-2px);
    }
    
    .btn-reject {
      background: var(--red);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 5px;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }
    
    .btn-reject:hover {
      background: #c0392b;
      transform: translateY(-2px);
    }
    
    .btn-edit {
      background: #f39c12;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 5px;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }
    
    .btn-edit:hover {
      background: #e67e22;
      transform: translateY(-2px);
    }
    
    .btn-delete {
      background: #c0392b;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }
    
    .btn-delete:hover {
      background: #a93226;
      transform: translateY(-2px);
    }
    
    .btn-back {
      background: var(--accent-2);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 20px;
      text-decoration: none;
      display: inline-block;
    }

    .filter-section {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-select {
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-family: inherit;
      min-width: 150px;
    }

    .add-user-btn {
      background: var(--accent-2);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .add-user-btn:hover {
      background: #1e6fb0;
      transform: translateY(-2px);
    }
    
    .action-group {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    
    .warning-text {
      color: var(--red);
      font-size: 0.8rem;
      margin-top: 5px;
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      overflow-y: auto;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      max-width: 500px;
      margin: 50px auto;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .modal-content h2 {
      color: var(--accent-2);
      margin-bottom: 20px;
    }

    .modal-content input,
    .modal-content select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #e2e8f0;
      border-radius: 5px;
      font-family: inherit;
    }

    .modal-content label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .modal-actions button {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-cancel {
      background: #95a5a6;
      color: white;
    }

    .btn-cancel:hover {
      background: #7f8c8d;
    }

    .btn-save {
      background: var(--accent-2);
      color: white;
    }

    .btn-save:hover {
      background: #1e6fb0;
    }

    .btn-danger {
      background: var(--red);
      color: white;
    }

    .btn-danger:hover {
      background: #c0392b;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="a_dashboard.html" class="btn-back"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
      <h1><i class="fas fa-user-check"></i> Manage Users</h1>
      <button class="add-user-btn" onclick="openAddUserModal()">
        <i class="fas fa-user-plus"></i> Add New User
      </button>
    </div>

    <div class="filter-section">
      <select class="filter-select" id="roleFilter">
        <option value="all">All Roles</option>
        <option value="supervisor">Supervisor</option>
        <option value="house_tutor">House Tutor</option>
        <option value="assistant_provost">Assistant Provost</option>
        <option value="provost">Provost</option>
        <option value="treasurer">Treasurer</option>
        <option value="vc">Vice Chancellor</option>
        <option value="admin">Admin</option>
      </select>
      
      <select class="filter-select" id="statusFilter">
        <option value="all">All Status</option>
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>
    
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Floor</th>
          <th>Registered</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <tr>
          <td colspan="7" style="text-align: center;">Loading users...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Add User Modal -->
  <div id="addUserModal" class="modal">
    <div class="modal-content">
      <h2><i class="fas fa-user-plus"></i> Add New User</h2>
      
      <div>
        <label>Full Name</label>
        <input type="text" id="newName" placeholder="Enter full name">
      </div>
      
      <div>
        <label>Email</label>
        <input type="email" id="newEmail" placeholder="user@example.com">
      </div>
      
      <div>
        <label>Password</label>
        <input type="password" id="newPassword" placeholder="••••••••">
      </div>
      
      <div>
        <label>Select Role</label>
        <select id="newRole" onchange="toggleFloorField()">
          <option value="supervisor">👤 Supervisor</option>
          <option value="house_tutor">🏠 House Tutor</option>
          <option value="assistant_provost">👔 Assistant Provost</option>
          <option value="provost">👑 Provost</option>
          <option value="treasurer">💰 Treasurer</option>
          <option value="vc">🎓 Vice Chancellor</option>
          <option value="admin">⚙️ Admin</option>
        </select>
      </div>
      
      <!-- Floor Selection (শুধু House Tutor এর জন্য) -->
      <div id="floorGroup" style="display: none;">
        <label>Select Floor <span style="color: #e74c3c;">*</span></label>
        <select id="newFloor">
          <option value="">-- Choose Floor --</option>
          <option value="Ground">Ground Floor</option>
          <option value="1">1st Floor</option>
          <option value="2">2nd Floor</option>
          <option value="3">3rd Floor</option>
          <option value="4">4th Floor</option>
          <option value="5">5th Floor</option>
        </select>
      </div>
      
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeAddUserModal()">Cancel</button>
        <button class="btn-save" onclick="addNewUser()">Create User</button>
      </div>
    </div>
  </div>

  <!-- Edit Role Modal -->
  <div id="editRoleModal" class="modal">
    <div class="modal-content">
      <h2><i class="fas fa-edit"></i> Change User Role</h2>
      
      <div>
        <label>Select New Role</label>
        <select id="newRoleSelect">
          <option value="supervisor">👤 Supervisor</option>
          <option value="house_tutor">🏠 House Tutor</option>
          <option value="assistant_provost">👔 Assistant Provost</option>
          <option value="provost">👑 Provost</option>
          <option value="treasurer">💰 Treasurer</option>
          <option value="vc">🎓 Vice Chancellor</option>
          <option value="admin">⚙️ Admin</option>
        </select>
      </div>
      
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeEditRoleModal()">Cancel</button>
        <button class="btn-save" onclick="confirmRoleChange()">Update Role</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="modal">
    <div class="modal-content" style="text-align: center;">
      <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: var(--red); margin-bottom: 20px;"></i>
      <h2 style="color: var(--red);">Confirm Delete</h2>
      <p style="margin: 20px 0;" id="deleteMessage">Are you sure you want to delete this user?</p>
      <div class="modal-actions" style="justify-content: center;">
        <button class="btn-danger" onclick="confirmDelete()">Delete</button>
        <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from '../js/supabase.js';

    let allUsers = [];
    let userToDelete = null;
    let editingUserId = null;

    // Check if admin
    async function checkAdmin() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        window.location.href = '../index.html';
        return false;
      }

      const { data: profile } = await supabase
        .from('profiles')
        .select('role')
        .eq('id', user.id)
        .single();

      if (profile?.role !== 'admin') {
        window.location.href = '../index.html';
        return false;
      }
      return true;
    }

    // Load all users
    async function loadUsers() {
      try {
        let query = supabase
          .from('profiles')
          .select('*')
          .order('created_at', { ascending: false });

        const statusFilter = document.getElementById('statusFilter').value;
        if (statusFilter !== 'all') {
          query = query.eq('approval_status', statusFilter);
        }

        const { data: users, error } = await query;

        if (error) throw error;

        allUsers = users || [];
        filterByRole();
      } catch (error) {
        console.error('Error loading users:', error);
        document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="7" style="text-align: center; color: red;">Error loading users</td></tr>';
      }
    }

    // Filter by role
    function filterByRole() {
      const roleFilter = document.getElementById('roleFilter').value;
      
      let filteredUsers = allUsers;
      if (roleFilter !== 'all') {
        filteredUsers = allUsers.filter(user => user.role === roleFilter);
      }

      displayUsers(filteredUsers);
    }

    // Display users
    function displayUsers(users) {
      const tbody = document.getElementById('usersTableBody');
      
      if (!users || users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No users found</td></tr>';
        return;
      }

      tbody.innerHTML = users.map(user => {
        const statusClass = user.approval_status === 'approved' ? 'status-approved' : 
                           user.approval_status === 'rejected' ? 'status-rejected' : 'status-pending';
        
        const roleName = {
          'supervisor': 'Supervisor',
          'house_tutor': 'House Tutor',
          'assistant_provost': 'Asst. Provost',
          'provost': 'Provost',
          'treasurer': 'Treasurer',
          'vc': 'Vice Chancellor',
          'admin': 'Admin'
        }[user.role] || user.role;

        return `
          <tr>
            <td>${user.name}</td>
            <td>${user.email}</td>
            <td><strong>${roleName}</strong></td>
            <td>${user.floor ? `Floor ${user.floor}` : '-'}</td>
            <td>${new Date(user.created_at).toLocaleDateString()}</td>
            <td><span class="status-badge ${statusClass}">${user.approval_status || 'pending'}</span></td>
            <td>
              <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                ${user.approval_status !== 'approved' ? 
                  `<button class="btn-approve" onclick="approveUser('${user.id}')">
                    <i class="fas fa-check"></i>
                  </button>` : ''
                }
                ${user.approval_status === 'pending' ? 
                  `<button class="btn-reject" onclick="rejectUser('${user.id}')">
                    <i class="fas fa-times"></i>
                  </button>` : ''
                }
                <button class="btn-edit" onclick="openEditRoleModal('${user.id}', '${user.role}')">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="btn-delete" onclick="openDeleteModal('${user.id}', '${user.name}')">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    // Toggle floor field
    window.toggleFloorField = function() {
      const role = document.getElementById('newRole').value;
      const floorGroup = document.getElementById('floorGroup');
      const floorSelect = document.getElementById('newFloor');
      
      if (role === 'house_tutor') {
        floorGroup.style.display = 'block';
        floorSelect.required = true;
      } else {
        floorGroup.style.display = 'none';
        floorSelect.required = false;
        floorSelect.value = '';
      }
    };

    // Open add user modal
    window.openAddUserModal = function() {
      document.getElementById('addUserModal').style.display = 'flex';
      document.getElementById('newName').value = '';
      document.getElementById('newEmail').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('newRole').value = 'supervisor';
      document.getElementById('newFloor').value = '';
      document.getElementById('floorGroup').style.display = 'none';
    };

    window.closeAddUserModal = function() {
      document.getElementById('addUserModal').style.display = 'none';
    };

    // Add new user
    window.addNewUser = async function() {
      const name = document.getElementById('newName').value;
      const email = document.getElementById('newEmail').value;
      const password = document.getElementById('newPassword').value;
      const role = document.getElementById('newRole').value;
      const floor = document.getElementById('newFloor')?.value || null;

      if (!name || !email || !password || !role) {
        alert('Please fill all fields');
        return;
      }

      if (role === 'house_tutor' && !floor) {
        alert('Please select a floor for House Tutor');
        return;
      }

      try {
        // Check floor availability for house tutor
        if (role === 'house_tutor') {
          const { data: existing } = await supabase
            .from('profiles')
            .select('id')
            .eq('role', 'house_tutor')
            .eq('floor', floor);

          if (existing && existing.length > 0) {
            alert(`Floor ${floor} already has a House Tutor`);
            return;
          }
        }

        // Create auth user
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: {
              name: name,
              role: role,
              floor: floor
            }
          }
        });

        if (error) throw error;

        const user = data.user;
        if (!user) throw new Error('User creation failed');

        // Insert profile
        const { error: profileError } = await supabase
          .from('profiles')
          .insert({
            id: user.id,
            name: name,
            email: email,
            role: role,
            floor: floor,
            approval_status: 'approved',
            created_at: new Date()
          });

        if (profileError) throw profileError;

        alert(`✅ ${role} created successfully!`);
        closeAddUserModal();
        loadUsers();

      } catch (error) {
        console.error('Error creating user:', error);
        alert('Error creating user: ' + error.message);
      }
    };

    // Open edit role modal
    window.openEditRoleModal = function(userId, currentRole) {
      editingUserId = userId;
      document.getElementById('newRoleSelect').value = currentRole;
      document.getElementById('editRoleModal').style.display = 'flex';
    };

    window.closeEditRoleModal = function() {
      document.getElementById('editRoleModal').style.display = 'none';
      editingUserId = null;
    };

    // Confirm role change
    window.confirmRoleChange = async function() {
      if (!editingUserId) return;
      
      const newRole = document.getElementById('newRoleSelect').value;
      
      try {
        const { error } = await supabase
          .from('profiles')
          .update({ 
            role: newRole,
            updated_at: new Date()
          })
          .eq('id', editingUserId);

        if (error) throw error;
        
        alert(`✅ Role updated to ${newRole} successfully!`);
        closeEditRoleModal();
        loadUsers();
        
      } catch (error) {
        alert('Error updating role: ' + error.message);
      }
    };

    // Approve user
    window.approveUser = async function(userId) {
      try {
        const { error } = await supabase
          .from('profiles')
          .update({ 
            approval_status: 'approved',
            approved_at: new Date()
          })
          .eq('id', userId);

        if (error) throw error;
        
        alert('✅ User approved successfully!');
        loadUsers();
      } catch (error) {
        alert('Error approving user: ' + error.message);
      }
    };

    // Reject user
    window.rejectUser = async function(userId) {
      const reason = prompt('Please enter rejection reason:');
      if (!reason) return;

      try {
        const { error } = await supabase
          .from('profiles')
          .update({ 
            approval_status: 'rejected',
            rejection_reason: reason
          })
          .eq('id', userId);

        if (error) throw error;
        
        alert('User rejected');
        loadUsers();
      } catch (error) {
        alert('Error rejecting user: ' + error.message);
      }
    };

    // Open delete modal
    window.openDeleteModal = function(userId, userName) {
      userToDelete = userId;
      document.getElementById('deleteMessage').textContent = `Are you sure you want to delete "${userName}"? This action cannot be undone.`;
      document.getElementById('deleteModal').style.display = 'flex';
    };

    window.closeDeleteModal = function() {
      document.getElementById('deleteModal').style.display = 'none';
      userToDelete = null;
    };

    // Confirm delete
   // Confirm delete user (সিম্পল ভার্সন)
window.confirmDelete = async function() {
  if (!userToDelete) return;

  try {
    // First delete from profiles (will cascade if foreign keys are set)
    const { error: profileError } = await supabase
      .from('profiles')
      .delete()
      .eq('id', userToDelete);

    if (profileError) {
      // If foreign key error, try to delete related records first
      if (profileError.message.includes('foreign key constraint')) {
        
        // Delete notices
        await supabase
          .from('notices')
          .delete()
          .eq('created_by', userToDelete);
        
        // Update approvals
        await supabase
          .from('application_approvals')
          .update({ approved_by: null })
          .eq('approved_by', userToDelete);
        
        // Update files
        await supabase
          .from('files')
          .update({ 
            supervisor_id: null,
            house_tutor_id: null,
            assistant_provost_id: null,
            provost_id: null,
            treasurer_id: null,
            vc_id: null 
          })
          .or(`supervisor_id.eq.${userToDelete},house_tutor_id.eq.${userToDelete},assistant_provost_id.eq.${userToDelete},provost_id.eq.${userToDelete},treasurer_id.eq.${userToDelete},vc_id.eq.${userToDelete}`);
        
        // Try deleting profile again
        const { error: retryError } = await supabase
          .from('profiles')
          .delete()
          .eq('id', userToDelete);
        
        if (retryError) throw retryError;
        
      } else {
        throw profileError;
      }
    }

    alert('✅ User deleted successfully!');
    closeDeleteModal();
    loadUsers();
    
  } catch (error) {
    console.error('Delete error:', error);
    alert('Error deleting user: ' + error.message);
    closeDeleteModal();
  }
};

    // Event listeners
    document.getElementById('roleFilter').addEventListener('change', filterByRole);
    document.getElementById('statusFilter').addEventListener('change', loadUsers);

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      const isAdmin = await checkAdmin();
      if (isAdmin) {
        await loadUsers();
      }
    });
  </script>
</body>
</html>
