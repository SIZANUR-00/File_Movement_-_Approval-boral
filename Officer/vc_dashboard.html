<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vice Chancellor Dashboard | File Movement & Approval System</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --accent:#282424;
      --accent-2:#3f8fd5;
      --muted:#243557;
      --gold:#ffce00;
      --green:#3cdd77bd;
      --container-width:1200px;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
    body{
      background:#f6f7fb;
      color:#0b1720;
      overflow-x:hidden;
      min-height:100vh;
    }

    header.topbar{
      position:fixed;top:0;left:0;right:0;z-index:60;
      display:flex;justify-content:center;pointer-events:none;
    }
    header .bar{
      pointer-events:auto;
      width:100%;max-width:var(--container-width);
      display:flex;align-items:center;justify-content:space-between;
      gap:16px;padding:18px 24px;margin:16px;
      background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));
      border-radius:12px;
      backdrop-filter:blur(10px) saturate(120%);
      box-shadow:0 6px 24px rgba(6,12,34,0.12);
    }

    .brand{display:flex;align-items:center;gap:12px}
    .brand .logo{
      width:44px;height:44px;border-radius:8px;
      overflow:hidden;background:linear-gradient(135deg,var(--accent),var(--accent-2));
      display:flex;align-items:center;justify-content:center;
    }
    .brand .logo img{width:100%;height:100%;object-fit:contain}
    .brand h1{color:#b29315;font-size:1.1rem;font-weight:600;text-shadow:0 2px 8px rgba(62, 8, 8, 0.35)}

    .user-area{
      display:flex;
      align-items:center;
      gap:20px;
    }

    .user-info{
      display:flex;
      align-items:center;
      gap:10px;
      background:rgba(255,255,255,0.2);
      padding:8px 15px;
      border-radius:25px;
      color:white;
    }
    
    .role-badge{
      background:var(--gold);
      color:#000;
      padding:5px 15px;
      border-radius:20px;
      font-weight:600;
      font-size:0.9rem;
    }

    .logout-btn{
      background:var(--gold);
      color:#000;
      border:none;
      padding:8px 20px;
      border-radius:25px;
      cursor:pointer;
      font-weight:600;
      display:flex;
      align-items:center;
      gap:6px;
      transition:0.3s;
    }
    .logout-btn:hover{
      background:#ffd633;
      transform:translateY(-2px);
    }

    .role-switcher {
      margin-left: 15px;
    }

    .role-select {
      padding: 8px 15px;
      border: 2px solid var(--gold);
      border-radius: 25px;
      background: rgba(255,255,255,0.2);
      color: white;
      font-weight: 600;
      cursor: pointer;
      min-width: 200px;
    }

    .role-select option {
      background: #2c3e50;
      color: white;
    }

    .hero{
      position:relative;
      height:40vh;
      min-height:300px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      overflow:hidden;
      margin-top:100px;
    }
    .slides{
      position:absolute;inset:0;z-index:0;
    }
    .slide{
      position:absolute;inset:0;
      background-size:cover;background-position:center;
      opacity:0;transform:scale(1.03);
      transition:opacity 1.2s ease, transform 8s ease;
    }
    .slide.active{opacity:1;transform:scale(1)}
    .hero::after{
      content:"";
      position:absolute;inset:0;z-index:1;
      background:linear-gradient(180deg,rgba(2,6,23,0.45),rgba(2,6,23,0.6));
    }
    .hero-inner{
      position:relative;z-index:2;
      color:#fff;
      text-align:center;
      padding:20px;
    }
    .hero-inner h2{
      font-size:2.2rem;
      color:#ffce00;
      margin-bottom:10px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .hero-inner p{
      font-size:1.05rem;
      color:#d9f0ff;
      font-weight:500;
      text-shadow: 0 1px 5px rgba(0,0,0,0.4);
    }

    main{
      max-width:var(--container-width);
      margin:0 auto;
      padding:40px 24px 60px;
    }

    .cards-row{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:24px;
      margin-top:40px;
    }

    .card{
      background:#fff;
      border-radius:14px;
      padding:28px 20px;
      text-align:center;
      box-shadow:0 10px 40px rgba(0,0,0,0.05);
      transition:transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover{
      transform:translateY(-8px);
      box-shadow:0 18px 48px rgba(0,0,0,0.08);
    }
    .card i{
      font-size:40px;
      color:var(--accent-2);
      margin-bottom:16px;
    }
    .card h3{
      color:var(--accent-2);
      font-size:1.25rem;
      margin-bottom:8px;
    }
    .card p{
      color:var(--muted);
      font-size:0.95rem;
      margin-bottom:16px;
    }
    .btn-link{
      background:var(--accent-2);
      color:#fff;
      padding:10px 20px;
      border-radius:8px;
      text-decoration:none;
      font-weight:600;
      transition:0.2s;
      display:inline-block;
    }
    .btn-link:hover{background:#1e6fb0;transform:translateY(-2px)}

    footer{
      text-align:center;
      color:var(--muted);
      margin-top:60px;
      padding:20px;
      font-size:14px;
    }

    @media (max-width:768px){
      .brand h1{font-size:1rem}
      .hero-inner h2{font-size:1.8rem}
      .cards-row{grid-template-columns:1fr}
      .user-area{flex-wrap:wrap;justify-content:flex-end}
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="bar">
      <div class="brand">
        <div class="logo" title="BAUET">
          <img src="../image/bauet-logo2.png" alt="BAUET Logo">
        </div>
        <div>
          <h1>Vice Chancellor Dashboard</h1>
        </div>
      </div>

      <div class="user-area">
        <div class="user-info">
          <i class="fas fa-user-circle fa-2x"></i>
          <span id="userName">Loading...</span>
          <span class="role-badge" id="userRoleBadge">VC</span>
        </div>
        
        <div id="roleSwitcherContainer"></div>
        
        <button class="logout-btn" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </div>
  </header>

  <section class="hero" id="hero">
    <div class="slides" id="slides">
      <div class="slide active" style="background-image:url('../image/BAUET-Campus.jpg')"></div>
      <div class="slide" style="background-image:url('../image/bauet.jpeg')"></div>
      <div class="slide" style="background-image:url('../image/boral_back.jpeg')"></div>
      <div class="slide" style="background-image:url('../image/acc_buli.jpeg')"></div>
    </div>

    <div class="hero-inner">
      <h2>Welcome, <span id="welcomeName">Vice Chancellor</span>!</h2>
      <p>Final approval authority for all applications.</p>
    </div>
  </section>

  <main>
    <div class="cards-row">
      <div class="card">
        <i class="fas fa-clock"></i>
        <h3>Pending Final Approval</h3>
        <span style="font-size: 2rem; color: var(--accent-2);" id="pendingCount">0</span>
      </div>

      <div class="card">
        <i class="fas fa-check-circle"></i>
        <h3>Approved</h3>
        <span style="font-size: 2rem; color: var(--accent-2);" id="approvedCount">0</span>
      </div>

      <div class="card">
        <i class="fas fa-chart-line"></i>
        <h3>This Month</h3>
        <span style="font-size: 2rem; color: var(--accent-2);" id="monthlyCount">0</span>
      </div>
    </div>

    <div class="cards-row" style="grid-template-columns:1fr;">
      <div class="card">
        <h3><i class="fas fa-gavel"></i> Applications for Final Approval</h3>
        <div style="margin-top: 20px;" id="applicationsList">
          <p>Loading applications...</p>
        </div>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2025 File Movement & Approval System — Developed by THUNDER-BOND
  </footer>

  <script>
    const slides = document.querySelectorAll('.slide');
    let idx = 0;
    setInterval(() => {
      slides[idx].classList.remove('active');
      idx = (idx + 1) % slides.length;
      slides[idx].classList.add('active');
    }, 5000);
  </script>
  
  <script type="module">
    import { initRoleSwitcher } from '../js/components/RoleSwitcher.js';
    import { supabase } from '../js/supabase.js';
    
    async function loadUserData() {
      try {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
          window.location.href = '../index.html';
          return;
        }
        
        const { data: profile } = await supabase
          .from('profiles')
          .select('name, role')
          .eq('id', user.id)
          .single();
        
        document.getElementById('userName').textContent = profile?.name || 'User';
        document.getElementById('welcomeName').textContent = profile?.name?.split(' ')[0] || 'Vice Chancellor';
        
        const roleBadge = document.getElementById('userRoleBadge');
        if (roleBadge) {
          roleBadge.textContent = 'VC';
        }

        await loadApplications();

      } catch (error) {
        console.error('Error:', error);
      }
    }

    async function loadApplications() {
      try {
        const { data: applications } = await supabase
          .from('files')
          .select('*')
          .eq('current_step', 'vc')
          .eq('status', 'pending');

        document.getElementById('pendingCount').textContent = applications?.length || 0;

        const listDiv = document.getElementById('applicationsList');
        if (!applications || applications.length === 0) {
          listDiv.innerHTML = '<p>No applications for final approval</p>';
        } else {
          listDiv.innerHTML = applications.map(app => `
            <div style="border-bottom:1px solid #eee; padding:10px; display:flex; justify-content:space-between;">
              <span>${app.title}</span>
              <button class="btn-link" style="padding:5px 10px;" onclick="viewApplication('${app.id}')">Review</button>
            </div>
          `).join('');
        }
      } catch (error) {
        console.error('Error loading applications:', error);
      }
    }

    window.viewApplication = function(id) {
      window.location.href = `view_file_details.html?id=${id}`;
    };
    
    await initRoleSwitcher();
    await loadUserData();
  </script>
  
  <script type="module" src="../js/auth.js"></script>
</body>
</html>
